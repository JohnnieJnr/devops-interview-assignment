# Keycloak configuration
keycloak:
  url: "http://host.docker.internal:8080"
  realm: "acme"
  clientId: "user-cleanup-service"
  clientSecretRef:
    name: "cleanup-secret-change-me"
    key: "client-secret"
    # Only used when secret.create is true; prefer a pre-created Secret in production
    value: ""

# Secret management
secret:
  # When false, create the Secret manually or via ExternalSecrets before installing
  create: false

# Cleanup configuration
cleanup:
  inactivityDays: 120
  dryRun: true
  exclusions:
    - admin
    - break-glass

# CronJob configuration
cronjob:
  schedule: "0 2 * * *"
  timeZone: "UTC"
  concurrencyPolicy: "Forbid"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  suspend: false

# Container configuration
image:
  repository: "cleaner"
  tag: "0.1.0"
  pullPolicy: "IfNotPresent"

imagePullSecrets: []

# Resource configuration
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

# Job configuration
job:
  restartPolicy: "OnFailure"
  backoffLimit: 3
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 3600

# Service account
serviceAccount:
  create: true
  name: ""
  annotations: {}

# RBAC is disabled by default; the client secret is injected via env secretKeyRef
rbac:
  create: false

# Security settings
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Common labels and optional CronJob annotations
labels:
  app.kubernetes.io/name: keycloak-cleaner
  app.kubernetes.io/version: "0.1.0"

annotations: {}
