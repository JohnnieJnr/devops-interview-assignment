apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.keycloak.clientSecretRef.name }}
  namespace: {{ .Values.namespace | quote }}
  labels:
    {{- include "keycloak-cleaner.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with .Values.keycloak.clientSecretRef.key }}
  {{ . }}: "changeme"
  {{- end }}
# NOTE: This manifest shows the basic structure. In production:
# 1. Use ExternalSecrets to inject the actual secret from a secret management system
# 2. Or reference an existing Secret by setting keycloak.clientSecretRef.name
# 3. Or use Sealed Secrets or other encryption solutions
#
# Example with ExternalSecrets (configure under externalSecrets in values.yaml):
#   apiVersion: external-secrets.io/v1beta1
#   kind: ExternalSecret
#   metadata:
#     name: keycloak-cleaner-external-secret
#   spec:
#     refreshInterval: 1h
#     secretStoreRef:
#       name: my-secret-store
#       kind: SecretStore
#     target:
#       name: keycloak-cleaner-secret
#       creationPolicy: Owner
#     data:
#     - secretKey: client-secret
#       remoteRef:
#         key: keycloak/cleaner-secret
