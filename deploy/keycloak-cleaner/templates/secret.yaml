{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.keycloak.clientSecretRef.name }}
  namespace: {{ include "keycloak-cleaner.namespace" . }}
  labels:
    {{- include "keycloak-cleaner.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.keycloak.clientSecretRef.key }}: {{ required "keycloak.clientSecretRef.value is required when secret.create is true" .Values.keycloak.clientSecretRef.value | quote }}
{{- end }}
