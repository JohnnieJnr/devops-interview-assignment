apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "keycloak-cleaner.fullname" . }}
  namespace: {{ include "keycloak-cleaner.namespace" . }}
  labels:
    {{- include "keycloak-cleaner.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  schedule: {{ .Values.cronjob.schedule | quote }}
  {{- if .Values.cronjob.timeZone }}
  timeZone: {{ .Values.cronjob.timeZone | quote }}
  {{- end }}
  concurrencyPolicy: {{ .Values.cronjob.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.cronjob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.cronjob.failedJobsHistoryLimit }}
  suspend: {{ .Values.cronjob.suspend }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.job.backoffLimit }}
      {{- if .Values.job.activeDeadlineSeconds }}
      activeDeadlineSeconds: {{ .Values.job.activeDeadlineSeconds }}
      {{- end }}
      {{- if .Values.job.ttlSecondsAfterFinished }}
      ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
      {{- end }}
      template:
        metadata:
          labels:
            {{- include "keycloak-cleaner.selectorLabels" . | nindent 12 }}
        spec:
          restartPolicy: {{ .Values.job.restartPolicy }}
          serviceAccountName: {{ include "keycloak-cleaner.serviceAccountName" . }}
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: cleaner
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - python
                - -m
                - cleaner.main
              env:
                - name: KEYCLOAK_URL
                  value: {{ .Values.keycloak.url | quote }}
                - name: KEYCLOAK_REALM
                  value: {{ .Values.keycloak.realm | quote }}
                - name: KEYCLOAK_CLIENT_ID
                  value: {{ .Values.keycloak.clientId | quote }}
                - name: KEYCLOAK_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.keycloak.clientSecretRef.name }}
                      key: {{ .Values.keycloak.clientSecretRef.key }}
                - name: INACTIVITY_DAYS
                  value: {{ .Values.cleanup.inactivityDays | quote }}
                - name: DRY_RUN
                  value: {{ .Values.cleanup.dryRun | quote }}
                - name: EXCLUSIONS
                  value: {{ join "," .Values.cleanup.exclusions | quote }}
                - name: AUDIT_LOG_FILE
                  value: {{ .Values.cleanup.auditLogFile | quote }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
              securityContext:
                {{- toYaml .Values.securityContext | nindent 16 }}
