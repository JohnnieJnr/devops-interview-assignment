{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "keycloak-cleaner.fullname" . }}
  namespace: {{ include "keycloak-cleaner.namespace" . }}
  labels:
    {{- include "keycloak-cleaner.labels" . | nindent 4 }}
rules:
  # Optional: only needed if mounting the client secret as a volume instead of env injection
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames:
      - {{ .Values.keycloak.clientSecretRef.name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "keycloak-cleaner.fullname" . }}
  namespace: {{ include "keycloak-cleaner.namespace" . }}
  labels:
    {{- include "keycloak-cleaner.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "keycloak-cleaner.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "keycloak-cleaner.serviceAccountName" . }}
    namespace: {{ include "keycloak-cleaner.namespace" . }}
{{- end }}
